models:
  analyst: "gemini/gemini-2.5-flash-lite"
  claim_extraction: "gemini/gemini-2.5-flash-lite"
  deduplication: "gemini/gemini-2.5-flash-lite"
  dispute_classification: "gemini/gemini-2.5-flash"
  arbitration: "gemini/gemini-2.5-flash-lite"
  synthesis: "openrouter/google/gemini-2.5-flash"

# Cross-family models for multi-analyst runs.
# Different model families produce genuine analytical disagreement,
# not just temperature noise from the same model.
analyst_models:
  - "gemini/gemini-2.5-flash"       # Google — strong reasoning, structured output
  - "openrouter/openai/gpt-5-nano"  # OpenAI — different training biases
  - "openrouter/deepseek/deepseek-chat"  # DeepSeek — independent model family

budgets:
  analyst_max_calls: 3
  analyst_min_successful: 2
  verification_max_turns: 10
  verification_max_disputes: 5
  pipeline_max_budget_usd: 5.0

# Each frame gives the analyst a distinct analytical lens on the same evidence.
# This is the core differentiator — not just different models, different methods.
analyst_frames:
  - "verification_first"          # Prioritize checking factual claims against sources
  - "structured_decomposition"    # Break the question into sub-questions, analyze each
  - "step_back_abstraction"       # Step back to broader principles, then reason forward

collection:
  num_queries: 10
  results_per_query: 10
  max_sources: 20

evidence_policy:
  default_time_sensitivity: "mixed"
  recency_weight: 0.5
