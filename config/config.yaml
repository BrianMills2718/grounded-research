models:
  analyst: "gemini/gemini-2.5-flash"
  claim_extraction: "gemini/gemini-2.5-flash"
  deduplication: "gemini/gemini-2.5-flash"
  dispute_classification: "gemini/gemini-2.5-flash"
  arbitration: "gemini/gemini-2.5-flash"
  synthesis: "gemini/gemini-2.5-flash"

# Cross-family models for Phase -1 thesis falsification
# Cross-family models for multi-analyst runs
# OpenRouter structured output has intermittent serialization issues —
# using Gemini family with different frames for reliable structured output.
# Restore cross-family models when OpenRouter instructor path is stable.
phase_minus1_models:
  - "gemini/gemini-2.5-flash"
  - "gemini/gemini-2.5-flash"
  - "gemini/gemini-2.5-flash"

budgets:
  analyst_max_calls: 3
  analyst_min_successful: 2
  verification_max_turns: 10
  verification_max_disputes: 5
  pipeline_max_budget_usd: 5.0

analyst_frames:
  - "general"
  - "general"
  - "general"

collection:
  num_queries: 10                          # search queries to generate
  results_per_query: 10                    # Brave results per query
  max_sources: 20                          # pages to actually fetch

evidence_policy:
  default_time_sensitivity: "mixed"
  recency_weight: 0.5
