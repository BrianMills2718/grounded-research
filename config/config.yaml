# Research depth: "standard" (fast, $0.06), "deep" (thorough, $0.15-0.25),
# "thorough" (exhaustive, $0.50-1.00). Controls source count, claim targets,
# synthesis length, and arbitration rounds. CLI: --depth deep
depth: "standard"

# gemini-2.5-flash-lite via OpenRouter returns multiple tool calls which
# Instructor rejects — every call fails then falls back. Use gpt-5-nano
# for cheap tasks, gemini-2.5-flash for reasoning tasks.
models:
  decomposition: "openrouter/google/gemini-2.5-flash"
  analyst: "openrouter/openai/gpt-5-nano"
  claim_extraction: "openrouter/openai/gpt-5-nano"
  deduplication: "openrouter/openai/gpt-5-nano"
  dispute_classification: "openrouter/google/gemini-2.5-flash"
  arbitration: "openrouter/openai/gpt-5-nano"
  synthesis: "openrouter/google/gemini-2.5-flash"
  source_scoring: "openrouter/google/gemini-2.5-flash"

# Fallback chains per task. When primary model exhausts retries,
# try these in order. llm_client supports this natively via
# fallback_models kwarg. Quality-aware: synthesis needs a strong
# model, cheap tasks can fall back to anything.
model_fallbacks:
  decomposition: ["openrouter/openai/gpt-5-nano"]
  analyst: ["openrouter/openai/gpt-5-nano"]
  claim_extraction: ["openrouter/openai/gpt-5-nano"]
  deduplication: ["openrouter/openai/gpt-5-nano"]
  dispute_classification: ["openrouter/openai/gpt-5-nano"]
  arbitration: ["openrouter/openai/gpt-5-nano"]
  synthesis: ["openrouter/openai/gpt-5-nano"]
  source_scoring: ["openrouter/openai/gpt-5-nano"]

# Cross-family models for multi-analyst runs.
# Different model families produce genuine analytical disagreement,
# not just temperature noise from the same model.
analyst_models:
  - "openrouter/google/gemini-2.5-flash"  # Google via OpenRouter (avoids direct API quota)
  - "openrouter/openai/gpt-5-nano"  # OpenAI — different training biases
  - "openrouter/deepseek/deepseek-chat"  # DeepSeek — independent model family

budgets:
  analyst_max_calls: 3
  analyst_min_successful: 2
  verification_max_turns: 10
  verification_max_disputes: 5
  pipeline_max_budget_usd: 5.0

# Each frame gives the analyst a distinct analytical lens on the same evidence.
# This is the core differentiator — not just different models, different methods.
analyst_frames:
  - "verification_first"          # Prioritize checking factual claims against sources
  - "structured_decomposition"    # Break the question into sub-questions, analyze each
  - "step_back_abstraction"       # Step back to broader principles, then reason forward

collection:
  num_queries: 15
  results_per_query: 10
  max_sources: 50
  ranking:
    preferred_domain_patterns:
      - ".gov"
      - ".edu"
      - "nber.org"
      - "worldbank.org"
      - "imf.org"
      - "oecd.org"
      - "poverty-action.org"
      - "givedirectly.org"
      - "stanford.edu"
      - "wiley.com"
      - "springer.com"
      - "sciencedirect.com"
      - "ncbi.nlm.nih.gov"
    deprioritized_domain_patterns:
      - "wikipedia.org"
      - "coursehero.com"
      - "substack.com"
      - "medium.com"
      - "blogspot.com"
      - "wordpress.com"
      - "youtube.com"
      - "reddit.com"
      - "twitter.com"
      - "facebook.com"
      - "linkedin.com"
      - "trendingworld.info"
    preferred_title_terms:
      - "systematic review"
      - "meta-analysis"
      - "working paper"
      - "randomized"
      - "experiment"
      - "pilot"
      - "evidence"
      - "evaluation"
      - "review"
    deprioritized_title_terms:
      - "study guide"
      - "opinion"
      - "explainer"
      - "map"
    pdf_bonus: 3
    preferred_domain_bonus: 5
    deprioritized_domain_penalty: 6
    preferred_title_bonus: 2
    deprioritized_title_penalty: 3
    quality_tier_bonus:
      authoritative: 8
      reliable: 3
      unknown: 0
      unreliable: -6

evidence_policy:
  default_time_sensitivity: "mixed"
  recency_weight: 0.5
  compression_threshold: 80
  synthesis_evidence_cap: 30
  structured_content_truncation_chars: 500
  long_report_content_truncation_chars: 400

deduplication:
  staged_trigger_claims: 20
  bucket_max_claims: 12
  max_doc_frequency_ratio: 0.45
  min_shared_informative_tokens: 1

phase_concurrency:
  claim_extraction_max_concurrency: 1

analysis_coverage:
  analyst_retry_on_undercoverage: true
  analyst_retry_min_evidence_items: 25
  analyst_retry_min_claim_ratio: 0.75
  analyst_retry_max_attempts: 1

runtime_reliability:
  use_run_local_observability_db: true
  timeout_policy: "allow"
  request_timeouts_s:
    decomposition: 120
    query_generation: 120
    source_scoring: 180
    analyst: 180
    claim_extraction: 240
    deduplication: 180
    dispute_classification: 180
    verification_query_generation: 120
    arbitration: 240
    synthesis: 240
    long_report: 300

# Synthesis mode controls how far the LONG REPORT goes beyond the claim ledger.
# The claim ledger, trace.json, and handoff.json always have full provenance
# regardless of this setting — they are always grounded.
#
# "grounded": long report only renders claims from the ledger
# "analytical": long report synthesizes inferences and estimates beyond what
#   any single source states, marked with [analytical inference]. The underlying
#   claim ledger remains fully grounded — the report is a rendering, not the
#   source of truth.
synthesis_mode: "analytical"
