# Research depth: "standard" (fast, $0.06), "deep" (thorough, $0.15-0.25),
# "thorough" (exhaustive, $0.50-1.00). Controls source count, claim targets,
# synthesis length, and arbitration rounds. CLI: --depth deep
depth: "standard"

# Tyler V1 model assignments (Build Plan §Stage 1-6).
# For cheap testing, use config/config.testing.yaml instead.
models:
  decomposition: "openrouter/google/gemini-3.1-pro-preview"        # Tyler: Gemini 3.1 Pro
  analyst: "openrouter/openai/gpt-5.4"                     # Tyler: per-analyst override below
  query_diversification: "openrouter/google/gemini-2.5-pro"  # Tyler: lightweight model call
  evidence_extraction: "openrouter/google/gemini-3.1-pro-preview"  # Tyler: same as decomposition
  claim_extraction: "openrouter/openai/gpt-5.4"            # Tyler: GPT-5.4 (best structured output)
  deduplication: "openrouter/openai/gpt-5.4"               # Tyler: part of Stage 4
  dispute_classification: "openrouter/openai/gpt-5.4"      # Tyler: part of Stage 4
  arbitration: "openrouter/anthropic/claude-opus-4.6"      # Tyler: Claude Opus 4.6
  synthesis: "openrouter/openai/gpt-5.4"                   # Tyler: TBD, must not dominate earlier stages
  source_scoring: "openrouter/google/gemini-3.1-pro-preview"       # Tyler: cost-efficient structured task

# Fallback chains per task (Tyler Build Plan §Cross-Cutting Requirements).
model_fallbacks:
  decomposition: ["openrouter/openai/gpt-5.4-mini", "openrouter/anthropic/claude-sonnet-4.6"]
  analyst:
    - "openrouter/openai/gpt-5.4-mini"
    - "openrouter/anthropic/claude-sonnet-4.6"
    - "openrouter/google/gemini-2.5-flash"
  query_diversification: ["openrouter/google/gemini-2.5-flash"]
  evidence_extraction: ["openrouter/google/gemini-2.5-flash"]
  claim_extraction: ["openrouter/anthropic/claude-opus-4.6"]   # Tyler: fallback Claude Opus
  deduplication: ["openrouter/google/gemini-2.5-flash"]
  dispute_classification: ["openrouter/google/gemini-2.5-flash"]
  arbitration: ["openrouter/openai/gpt-5.4"]
  synthesis: ["openrouter/anthropic/claude-opus-4.6"]
  source_scoring: ["openrouter/google/gemini-2.5-flash"]

# Tyler V1 Stage 3 analyst assignment (Build Plan §Stage 3).
# Tyler specified cross-family diversity as a non-negotiable constraint.
analyst_models:
  - "openrouter/openai/gpt-5.4"                    # Analyst A — step-back abstraction (Tyler: GPT-5.4)
  - "openrouter/google/gemini-3.1-pro-preview"      # Analyst B — structured decomposition (Tyler: Gemini 3.1 Pro)
  - "openrouter/anthropic/claude-opus-4.6"          # Analyst C — verification-first (Tyler: Claude Opus 4.6)

# Tyler Build Plan §Stage 5: max 3 queries per disputed claim, max 2 rounds.
budgets:
  analyst_max_calls: 3
  analyst_min_successful: 2
  verification_max_turns: 2
  verification_max_disputes: 5
  verification_max_queries_per_dispute: 3
  pipeline_max_budget_usd: 5.0

# Each frame gives the analyst a distinct analytical lens on the same evidence.
# This is the core differentiator — not just different models, different methods.
analyst_frames:
  - "step_back_abstraction"       # Analyst A — principle-first landscape analysis
  - "structured_decomposition"    # Analyst B — explicit sub-question-by-sub-question analysis
  - "verification_first"          # Analyst C — challenge claims against evidence and assumptions

collection:
  search_provider: "tavily"
  search_locale: "en"
  num_queries: 15
  results_per_query: 10
  max_sources: 50
  ranking:
    preferred_domain_patterns:
      - ".gov"
      - ".edu"
      - "nber.org"
      - "worldbank.org"
      - "imf.org"
      - "oecd.org"
      - "poverty-action.org"
      - "givedirectly.org"
      - "stanford.edu"
      - "wiley.com"
      - "springer.com"
      - "sciencedirect.com"
      - "ncbi.nlm.nih.gov"
    deprioritized_domain_patterns:
      - "wikipedia.org"
      - "coursehero.com"
      - "substack.com"
      - "medium.com"
      - "blogspot.com"
      - "wordpress.com"
      - "youtube.com"
      - "reddit.com"
      - "twitter.com"
      - "facebook.com"
      - "linkedin.com"
      - "trendingworld.info"
    preferred_title_terms:
      - "systematic review"
      - "meta-analysis"
      - "working paper"
      - "randomized"
      - "experiment"
      - "pilot"
      - "evidence"
      - "evaluation"
      - "review"
    deprioritized_title_terms:
      - "study guide"
      - "opinion"
      - "explainer"
      - "map"
    pdf_bonus: 3
    preferred_domain_bonus: 5
    deprioritized_domain_penalty: 6
    preferred_title_bonus: 2
    deprioritized_title_penalty: 3
    quality_tier_bonus:
      authoritative: 8
      reliable: 3
      unknown: 0
      unreliable: -6

evidence_policy:
  default_time_sensitivity: "mixed"
  recency_weight: 0.5
  compression_threshold: 80
  synthesis_evidence_cap: 30
  structured_content_truncation_chars: 500
  long_report_content_truncation_chars: 400

source_quality:
  default_topic: "default"
  half_life_days:
    ai_models: 365
    software: 730
    medicine: 1825
    economics: 3285
    physics: 4745
    default: 1095
  temporal_weight:
    ai_models: 0.5
    software: 0.4
    default: 0.2
    physics: 0.05
  authority_floor: 0.4
  deprecation_penalty: 0.3
  stale_year_penalty: 0.15
  current_versions: {}

deduplication:
  staged_trigger_claims: 20
  bucket_max_claims: 12
  max_doc_frequency_ratio: 0.45
  min_shared_informative_tokens: 1

phase_concurrency:
  claim_extraction_max_concurrency: 1
  evidence_extraction_max_concurrency: 2

analysis_coverage:
  analyst_retry_on_undercoverage: true
  analyst_retry_min_evidence_items: 25
  analyst_retry_min_claim_ratio: 0.75
  analyst_retry_max_attempts: 1

analyst_success:
  require_claim: true
  require_recommendation: true
  require_counterargument: true
  require_claim_evidence_ids: true
  require_counterargument_evidence_ids: true
# Tyler V1 §Stage 3 validation: "claims must have at least 3 entries"
  min_claims_by_depth:
    standard: 3
    deep: 3
    thorough: 3

tyler_literal_parity:
  stage4_retry_on_empty_claims: true
  stage4_retry_model: "openrouter/google/gemini-2.5-flash"
  stage4_retry_fallback_models:
    - "openrouter/openai/gpt-5-nano"
  stage6_repair_on_underfilled_fields: true
  stage6_repair_attempts: 1
  stage6_min_tradeoffs: 1
  stage6_min_preserved_alternatives: 1
  stage6_compaction_char_limit: 80000
  stage6_noncritical_claim_chars: 180
  stage6_non_dispute_source_summary_chars: 140
  stage6_top_sources_cap: 12

# Request-level timeouts removed — observe hangs, don't kill calls.
# See docs/plans/llm_call_observability.md for rationale.
# The llm_client safety timeout (300s dead-connection detector) still applies.
runtime_reliability:
  use_run_local_observability_db: true

# Synthesis mode controls how far the LONG REPORT goes beyond the claim ledger.
# The claim ledger, trace.json, and handoff.json always have full provenance
# regardless of this setting — they are always grounded.
#
# "grounded": long report only renders claims from the ledger
# "analytical": long report synthesizes inferences and estimates beyond what
#   any single source states, marked with [analytical inference]. The underlying
#   claim ledger remains fully grounded — the report is a rendering, not the
#   source of truth.
synthesis_mode: "analytical"

export_policy:
  sectioned_synthesis_min_word_target: 9000
  sectioned_synthesis_max_distinction_sections: 4
  sectioned_synthesis_enabled_depths:
    - "thorough"
