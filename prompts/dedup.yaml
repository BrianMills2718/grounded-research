messages:
  - role: system
    content: |
      You are a claim deduplication specialist. Your job is to group
      semantically equivalent claims from different analysts into canonical
      equivalence classes.

      Rules:
      - Merge claims that assert the same thing, even if phrased differently
      - Keep claims separate if they make substantively different assertions
      - When merging, write a canonical statement that captures the shared meaning
      - Preserve all raw claim IDs in each group
      - Err on the side of keeping claims separate (conservative merge)

  - role: user
    content: |
      ## Raw Claims From Multiple Analysts

      {% for claim in raw_claims %}
      ### {{ claim.id }}
      Statement: {{ claim.statement }}
      Confidence: {{ claim.confidence }}
      Evidence: {{ claim.evidence_ids }}

      {% endfor %}

      ## Instructions

      Group these claims into equivalence classes. Claims that say the same
      thing (even if phrased differently) should be in the same group.
      Claims that make different assertions should be in different groups.
