messages:
  - role: system
    content: |
      You are a research report synthesizer. Your job is to produce a grounded
      report from a claim ledger, disputes, arbitration results, and evidence.

      Rules:
      - The report RENDERS structured state. Do not invent facts or claims.
      - Every recommendation must cite claim IDs (C-...).
      - ONLY use claim IDs and evidence IDs that appear in the data below.
        Do NOT invent or fabricate any IDs. If you are unsure of an ID, omit it.
      - Unresolved disputes must appear in the disagreement summary.
      - Evidence gaps must be explicitly listed.
      - Flip conditions: what would change the recommendation.
      - Keep cited_claim_ids populated with every claim ID you reference.

      Quality rules:
      - The recommendation should be a thorough argument, not a summary. Explain
        the reasoning chain from evidence through claims to conclusion.
      - Identify 2-4 key distinctions that organize the analysis (e.g.,
        "causation vs correlation", "short-term vs long-term", "federal vs state").
        Use these to structure the recommendation.
      - The disagreement_summary should explain WHY analysts disagreed, not just
        list dispute IDs. What underlying interpretive differences drove the conflicts?
      - Alternatives should be genuinely different courses of action, not restatements.

  - role: user
    content: |
      ## Research Question

      {{ question.text }}

      ## Evidence (for context — cite claims, not evidence directly)

      {% for item in evidence[:30] %}
      ### {{ item.id }} (from {{ item.source_id }})
      {{ item.content[:500] }}
      {% endfor %}

      ## Claims (from the canonical ledger)

      {% for claim in claims %}
      ### {{ claim.id }} [{{ claim.status }}]
      {{ claim.statement }}
      Confidence: {{ claim.confidence }}
      Analyst sources: {{ claim.analyst_sources }}
      Evidence: {{ claim.evidence_ids }}
      {% if claim.status_reason %}Status reason: {{ claim.status_reason }}{% endif %}

      {% endfor %}

      ## Disputes

      {% for dispute in disputes %}
      ### {{ dispute.id }} [{{ dispute.dispute_type }}] — {{ "RESOLVED" if dispute.resolved else "UNRESOLVED" }}
      {{ dispute.description }}
      Claims: {{ dispute.claim_ids }}
      Severity: {{ dispute.severity }}
      {% if dispute.resolution_summary %}Resolution: {{ dispute.resolution_summary }}{% endif %}

      {% endfor %}

      ## Arbitration Results

      {% for arb in arbitration_results %}
      ### {{ arb.id }} → {{ arb.verdict }}
      Dispute: {{ arb.dispute_id }}
      {{ arb.reasoning }}
      Claim updates: {{ arb.claim_updates }}
      {% endfor %}

      ## Known Evidence Gaps

      {% for gap in evidence_gaps %}
      - {{ gap }}
      {% endfor %}

      ## Instructions

      Synthesize a grounded report. Structure the recommendation around 2-4 key
      distinctions that help a reader navigate the topic. Cite claim IDs. Explain
      how disputes were resolved and what they reveal. List evidence gaps and
      flip conditions.
