version: 1
project: grounded-research
publish:
  - path: PROJECT.md
    type: ProjectDossier
    title: Grounded Research Project Dossier
    tags: [portfolio, research-system, adjudication, dossier]
  - path: README.md
    type: ProjectOverview
    title: Grounded Research Overview
    tags: [portfolio, research-system, retrieval]
  - path: docs/METHODOLOGY.md
    type: Methodology
    title: Grounded Research Methodology
    tags: [portfolio, research-system, adjudication, methodology]
  - path: docs/ARTIFACTS.md
    type: ArtifactRegister
    title: Grounded Research Artifact Register
    tags: [portfolio, research-system, artifacts]
  - path: docs/VALIDATION.md
    type: Validation
    title: Grounded Research Validation Register
    tags: [portfolio, research-system, validation, evaluation]
  - path: docs/CONCERNS.md
    type: ConcernRegister
    title: Grounded Research Concern Register
    tags: [portfolio, research-system, concerns]
  - path: docs/ADJUDICATION_WALKTHROUGH.md
    type: PortfolioGuide
    title: Grounded Research Adjudication Walkthrough
    tags: [portfolio, adjudication, research-system]
  - path: docs/ARCHITECTURE_ONE_PAGE.md
    type: ArchitectureDoc
    tags: [research-system, architecture]
  - path: docs/CONTRACTS.md
    type: ContractDoc
    tags: [research-system, contracts]
  - path: docs/DOMAIN_MODEL.md
    type: DomainModel
    tags: [research-system, domain-model]
  - path: docs/FEATURE_STATUS.md
    type: StatusReport
    tags: [research-system, status]
  - path: output/fair_tyler_literal_parity_ubi_reanchor_v8_vs_ubi_dense_dedup_eval.md
